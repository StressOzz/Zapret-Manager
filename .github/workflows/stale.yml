name: Close inactive issues

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest

    permissions:
      issues: write
      pull-requests: write
      contents: write

    steps:
      - uses: actions/stale@v10
        with:
          days-before-issue-stale: 14
          days-before-issue-close: 0

          stale-issue-label: без активности
          remove-stale-when-updated: true

          stale-issue-message: ''
          close-issue-message: 'Закрыто автоматически из-за отсутствия активности в течение 14 дней.'

          days-before-pr-stale: -1
          stale-pr-message: ''
          close-pr-message: ''
