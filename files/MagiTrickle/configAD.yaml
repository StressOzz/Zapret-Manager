configVersion: 0.8.2
app:
  httpWeb:
    enabled: true
    auth:
      enabled: false
    host:
      address: '[::]'
      port: 8080
    skin: default
  dnsProxy:
    host:
      address: '[::]'
      port: 3553
    upstream:
      address: 127.0.0.1
      port: 53
    disableRemap53: false
    disableFakePTR: false
    disableDropAAAA: false
    maxIdleConns: 10
    maxConcurrent: 100
    timeout: 5s
  netfilter:
    iptables:
      chainPrefix: MT_
    ipset:
      tablePrefix: mt_
      additionalTTL: 1h0m0s
    disableIPv4: false
    disableIPv6: false
    startMarkTableIndex: 1298229097
  link:
  - br-lan
  showAllInterfaces: false
  logLevel: error
